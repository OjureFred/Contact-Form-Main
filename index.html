<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <script src="https://cdn.tailwindcss.com"></script>

  <title>Frontend Mentor | Contact form</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <div class="flex justify-center items-center bg-green-50 w-full h-screen">
    <div class="bg-white w-1/2">
      <h1 class="m-4 text-2xl font-bold">Contact Us</h1>
      <form action="">
        <div class="flex gap-4 m-4">
          <div class="flex flex-col w-1/2 form-group">
            <label for="first-name" class="m-4">First Name *</label>
            <input class="border border-gray-300 rounded-md p-2" type="text" id="first-name" name="first-name">
            <span class="error-message hidden text-red-500" id="first-name-error">This field is required</span>
          </div>
          <div class="flex flex-col w-1/2 form-group">
            <label for="last-name" class="m-4">Last Name *</label>
            <input class="border border-gray-300 rounded-md p-2" type="text" id="last-name" name="last-name">
            <span class="error-message hidden text-red-500" id="last-name-error">This field is required</span>
          </div>
        </div>
        <div class=" flex flex-col m-4">
          <label for="email" class="m-4">Email Address *</label>
          <input class="border border-gray-300 rounded-md p-2" type="email" id="email" name="email">
          <span class="error-message hidden text-red-500" id="email-error">This field is required</span>
        </div>
        <div class="flex flex-col m-4">
          <label for="query-type" class="m-4">Query Type *</label>
          <div class="flex flex-row gap-4">
            <div class=" w-1/2 border border-gray-300 rounded-md p-2">
              <input class="m-4" type="radio" name="query-type" value="general">General Enquiry
            </div>
            <div class=" w-1/2 border border-gray-300 rounded-md p-2">
              <input class="m-4" type="radio" name="query-type" value="support">Support Request
            </div>
          </div>
          <span class="error-message hidden text-red-500" id="query-type-error">This field is required</span>
        </div>

        <div class=" flex flex-col form-group m-4">
          <label for="message" class="m-4">Message *</label>
          <textarea class="border border-gray-300 rounded-md p-2" id="message" name="message" rows="4"></textarea>
          <span class="error-message hidden text-red-500" id="message-error">This field is required</span>
        </div>
        <div class="flex items-center m-4">
          <input type="checkbox" id="consent" name="consent" required>
          <label for="consent" class="m-4">I consent to being contacted by the team *</label>
        </div>

        <button class="bg-green-800 hover:bg-green-600 w-full text-white px-4 py-2 rounded-md"
          type="submit">Submit</button>
      </form>
    </div>
  </div>


  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </div>
</body>

</html>
